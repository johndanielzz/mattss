<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MatrixMarket - Chat</title>
    <link rel="icon" type="image/x-icon" href="matrixx.png">
    <link rel="stylesheet" href="style.css">
    <style>
        body{margin:0;font-family:"Poppins",sans-serif;background:#f5f7fb;color:#1f2937}
        header{background:#ffffff;border-bottom:1px solid #e5e7eb;box-shadow:0 2px 10px rgba(15,23,42,.06);display:flex;justify-content:space-between;align-items:center;padding:14px 18px;position:sticky;top:0;z-index:1000}
        .logo{font-size:1.4rem;font-weight:800;color:#111827}nav{display:flex;gap:12px;flex-wrap:wrap}nav a{color:#374151;text-decoration:none;font-weight:600}
        .chat-shell{width:min(1160px,100% - 16px);margin:16px auto;display:grid;grid-template-columns:290px 1fr;gap:12px;min-height:78vh}
        .panel,.thread{background:#ffffff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden;box-shadow:0 8px 20px rgba(15,23,42,.05)}
        .panel-head,.thread-head{padding:10px 12px;background:#f9fafb;border-bottom:1px solid #e5e7eb}
        .panel-head h3,.thread-head h3{margin:0;font-size:1rem;color:#111827}
        .panel-body{padding:10px;display:grid;gap:8px}
        input,textarea{width:100%;border:1px solid #d1d5db;background:#ffffff;color:#111827;border-radius:10px;padding:9px;font:inherit}
        .contacts{display:grid;gap:6px;max-height:52vh;overflow:auto}
        .contact-item{display:grid;grid-template-columns:1fr auto;gap:6px;align-items:center}
        .contact-btn{border:1px solid #d1d5db;background:#ffffff;color:#111827;border-radius:10px;padding:9px;text-align:left;cursor:pointer}
        .pin-btn{border:1px solid #d1d5db;background:#ffffff;color:#4b5563;border-radius:10px;padding:8px 10px;cursor:pointer}
        .pin-btn.active{border-color:#f59e0b;color:#b45309;background:#fffbeb}
        .contact-btn.active{border-color:#93c5fd;background:#eff6ff}
        .thread{display:grid;grid-template-rows:auto 1fr auto}
        .meta{font-size:.82rem;color:#6b7280;margin-top:3px}
        .messages{padding:12px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;background:#f8fafc;min-height:300px;max-height:calc(78vh - 140px)}
        .msg{max-width:78%;padding:9px 11px;border-radius:12px;line-height:1.35;word-break:break-word}
        .msg.me{align-self:flex-end;background:#dbeafe;color:#1e3a8a;border:1px solid #bfdbfe;border-bottom-right-radius:3px}
        .msg.other{align-self:flex-start;background:#ffffff;color:#1f2937;border:1px solid #e5e7eb;border-bottom-left-radius:3px}
        .msg .small{display:block;font-size:.72rem;opacity:.75;margin-top:4px}
        .typing{font-size:.78rem;color:#2563eb;padding:0 12px 8px;display:none}
        .composer{padding:10px;border-top:1px solid #e5e7eb;display:grid;gap:8px}
        .quick{display:flex;gap:6px;flex-wrap:wrap}
        .quick button,.action-btn,.send-btn{border:1px solid #d1d5db;background:#ffffff;color:#1f2937;border-radius:8px;padding:7px 10px;cursor:pointer}
        .row{display:grid;grid-template-columns:1fr auto;gap:7px}.send-btn{background:#2563eb;color:#fff;border:1px solid #1d4ed8;font-weight:700}
        .composer-foot{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;font-size:.78rem;color:#6b7280}
        .empty{color:#6b7280;text-align:center;border:1px dashed #d1d5db;border-radius:10px;padding:14px}
        @media (max-width:900px){.chat-shell{grid-template-columns:1fr}.panel{order:2}.thread{order:1}}
    </style>
    <link rel="stylesheet" href="upgrade.css">
    <script src="firebase-online-storage.js"></script>
</head>
<body>
    <header>
        <div class="logo">MatrixMarket</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="cart.html">Cart</a>
            <a href="chat.html">Chat</a>
        </nav>
    </header>

    <main class="chat-shell">
        <aside class="panel">
            <div class="panel-head"><h3>Conversations</h3></div>
            <div class="panel-body">
                <input id="contactSearch" type="text" placeholder="Search contact">
                <div style="display:grid;grid-template-columns:1fr auto;gap:6px;">
                    <input id="newContactInput" type="text" placeholder="New contact name">
                    <button class="action-btn" id="addContactBtn" type="button">Add</button>
                </div>
                <div id="contactList" class="contacts"></div>
                <div style="display:flex;gap:6px;flex-wrap:wrap;">
                    <button class="action-btn" id="newSupportBtn" type="button">Message Support</button>
                    <button class="action-btn" id="exportBtn" type="button">Export Chat</button>
                    <button class="action-btn" id="exportTxtBtn" type="button">Export TXT</button>
                    <button class="action-btn" id="clearBtn" type="button">Clear Thread</button>
                    <button class="action-btn" id="complaintBtn" type="button">Complain Seller</button>
                    <button class="action-btn" id="ratingBtn" type="button">Rate Seller</button>
                </div>
            </div>
        </aside>

        <section class="thread">
            <div class="thread-head">
                <h3 id="chatTitle">Chat</h3>
                <div class="meta" id="chatMeta">Secure local conversation</div>
            </div>
            <div id="messages" class="messages"></div>
            <div class="typing" id="typingNote">Support is typing...</div>
            <div class="composer">
                <div class="quick">
                    <button type="button" data-quick="Is this item still available?">Available?</button>
                    <button type="button" data-quick="Can I get a discount on bulk order?">Bulk discount?</button>
                    <button type="button" data-quick="Please share delivery timeline.">Delivery time?</button>
                </div>
                <input id="messageSearch" type="text" placeholder="Filter current messages">
                <div class="row">
                    <textarea id="messageInput" rows="2" placeholder="Type message and press Enter"></textarea>
                    <button class="send-btn" id="sendBtn" type="button">Send</button>
                </div>
                <div class="composer-foot">
                    <span id="charCount">0 chars</span>
                    <button class="action-btn" id="clearDraftBtn" type="button">Clear Draft</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const state = {
            currentUser: "Guest",
            target: "Support",
            contacts: [],
            messages: [],
            pinned: new Set()
        };

        function byId(id){ return document.getElementById(id); }
        function read(key, fallback){ try{ const d=JSON.parse(MMStorage.getItem(key)||"null"); return d??fallback; }catch(_){ return fallback; } }
        function write(key, value){ MMStorage.setItem(key, JSON.stringify(value)); }
        function nowIso(){ return new Date().toISOString(); }
        function fmtTime(iso){ const d = new Date(iso); return d.toLocaleString(); }

        function sanitizeName(v){ return String(v || "").trim(); }
        function getCurrentUserName(){
            const user = read("currentUser", null) || {};
            return sanitizeName(user.username || user.fullName || user.name || user.email || "Guest");
        }
        function getCurrentUserEmail(){
            const user = read("currentUser", null) || {};
            return sanitizeName(user.email || "");
        }

        function sortedPair(a,b){ return [a,b].map(sanitizeName).sort(function(x,y){ return x.localeCompare(y); }); }
        function threadId(a,b){ const p = sortedPair(a,b); return p[0] + "::" + p[1]; }
        function legacyKey(a,b){ const p = sortedPair(a,b); return "chat_" + p[0] + "_" + p[1]; }
        function draftKey(){ return threadId(state.currentUser, state.target); }

        function loadPinned(){
            const rows = read("chatPinned", []);
            state.pinned = new Set(Array.isArray(rows) ? rows.map(sanitizeName).filter(Boolean) : []);
        }

        function savePinned(){
            write("chatPinned", Array.from(state.pinned));
        }

        function saveDraft(){
            const all = read("chatDrafts", {});
            all[draftKey()] = byId("messageInput").value;
            write("chatDrafts", all);
            updateCharCount();
        }

        function loadDraft(){
            const all = read("chatDrafts", {});
            byId("messageInput").value = String(all[draftKey()] || "");
            updateCharCount();
        }

        function clearDraft(){
            const all = read("chatDrafts", {});
            delete all[draftKey()];
            write("chatDrafts", all);
            byId("messageInput").value = "";
            updateCharCount();
        }

        function updateCharCount(){
            byId("charCount").textContent = String(byId("messageInput").value.length) + " chars";
        }

        function allSellerContacts(){
            const names = [];
            const sellers = read("sellers", []);
            if (Array.isArray(sellers)) {
                sellers.forEach(function(s){
                    const n = sanitizeName((s && (s.name || s.fullName || s.email)) || "");
                    if (n) names.push(n);
                });
            } else if (sellers && typeof sellers === "object") {
                Object.keys(sellers).forEach(function(k){ if (sanitizeName(k)) names.push(sanitizeName(k)); });
            }

            const products = read("products", []);
            if (Array.isArray(products)) {
                products.forEach(function(p){
                    const n = sanitizeName((p && (p.seller || p.sellerName || p.sellerEmail)) || "");
                    if (n) names.push(n);
                });
            }

            return names;
        }

        function allSellers(){
            const rows = read("sellers", []);
            if (Array.isArray(rows)) return rows;
            if (rows && typeof rows === "object") {
                return Object.keys(rows).map(function(name){
                    return { name: name, ...(rows[name] || {}) };
                });
            }
            return [];
        }

        function resolveSeller(target){
            const t = sanitizeName(target).toLowerCase();
            const sellers = allSellers();
            return sellers.find(function (s) {
                const keys = [s.store, s.name, s.fullName, s.email].map(function (v) {
                    return sanitizeName(v).toLowerCase();
                });
                return keys.includes(t);
            }) || null;
        }

        function isSupportTarget(){
            return sanitizeName(state.target).toLowerCase() === "support";
        }

        function submitComplaint(){
            if (!state.target || isSupportTarget()) {
                alert("Select a seller conversation first.");
                return;
            }
            const seller = resolveSeller(state.target);
            if (!seller) {
                alert("This contact is not recognized as a seller.");
                return;
            }
            const complaint = prompt("Enter your complaint about this seller:");
            if (!complaint || !complaint.trim()) return;

            const rows = read("sellerComplaints", []);
            const list = Array.isArray(rows) ? rows : [];
            list.unshift({
                id: "CMP-" + Date.now() + "-" + Math.random().toString(36).slice(2, 6),
                seller: sanitizeName(state.target),
                sellerName: sanitizeName(seller.store || seller.fullName || seller.name || state.target),
                sellerEmail: sanitizeName(seller.email || ""),
                buyerName: state.currentUser,
                buyerEmail: getCurrentUserEmail(),
                text: complaint.trim(),
                status: "new",
                date: nowIso(),
                createdAt: nowIso()
            });
            write("sellerComplaints", list);
            alert("Complaint submitted to admin.");
        }

        function submitRating(){
            if (!state.target || isSupportTarget()) {
                alert("Select a seller conversation first.");
                return;
            }
            const seller = resolveSeller(state.target);
            if (!seller) {
                alert("This contact is not recognized as a seller.");
                return;
            }

            const ratingRaw = prompt("Rate this seller from 1 to 5:");
            const rating = Number(ratingRaw);
            if (!Number.isFinite(rating) || rating < 1 || rating > 5) {
                alert("Rating must be a number between 1 and 5.");
                return;
            }
            const note = prompt("Optional rating note:") || "";

            const rows = read("sellerRatings", []);
            const list = Array.isArray(rows) ? rows : [];
            list.unshift({
                id: "RAT-" + Date.now() + "-" + Math.random().toString(36).slice(2, 6),
                seller: sanitizeName(state.target),
                sellerName: sanitizeName(seller.store || seller.fullName || seller.name || state.target),
                sellerEmail: sanitizeName(seller.email || ""),
                buyerName: state.currentUser,
                buyerEmail: getCurrentUserEmail(),
                rating: Math.round(rating),
                note: note.trim(),
                date: nowIso(),
                createdAt: nowIso()
            });
            write("sellerRatings", list);
            alert("Rating submitted to admin.");
        }

        function knownThreadContacts(){
            const threads = read("chatThreads", {});
            const contacts = [];
            Object.keys(threads).forEach(function(id){
                const parts = id.split("::");
                if (parts.length !== 2) return;
                if (parts[0] === state.currentUser) contacts.push(parts[1]);
                if (parts[1] === state.currentUser) contacts.push(parts[0]);
            });
            return contacts;
        }

        function buildContacts(){
            const set = new Set(["Support"]);
            const urlTarget = sanitizeName(new URLSearchParams(window.location.search).get("seller") || "");
            const storedTarget = sanitizeName(MMStorage.getItem("chatWith") || "");
            if (urlTarget) set.add(urlTarget);
            if (storedTarget) set.add(storedTarget);
            allSellerContacts().forEach(function(n){ set.add(n); });
            knownThreadContacts().forEach(function(n){ set.add(n); });
            set.delete(state.currentUser);
            state.contacts = Array.from(set).filter(Boolean).sort(function(a,b){
                const pinA = state.pinned.has(a) ? 1 : 0;
                const pinB = state.pinned.has(b) ? 1 : 0;
                if (pinA !== pinB) return pinB - pinA;
                return a.localeCompare(b);
            });
            if (!state.contacts.length) state.contacts = ["Support"];

            const preferred = urlTarget || storedTarget || state.target;
            state.target = state.contacts.includes(preferred) ? preferred : state.contacts[0];
            MMStorage.setItem("chatWith", state.target);
        }

        function getThreadMessages(user, target){
            const id = threadId(user, target);
            const threads = read("chatThreads", {});
            const modern = Array.isArray(threads[id]) ? threads[id] : [];
            const legacy = read(legacyKey(user, target), []);

            const normalizedLegacy = Array.isArray(legacy) ? legacy.map(function(m, idx){
                let t = m.timeIso || m.createdAt || "";
                if (!t) {
                    const parsed = Date.parse(String(m.time || ""));
                    t = Number.isFinite(parsed)
                        ? new Date(parsed).toISOString()
                        : new Date(idx * 1000).toISOString();
                }
                return {
                    id: m.id || "legacy-" + idx + "-" + Math.random().toString(36).slice(2,8),
                    sender: sanitizeName(m.sender || "Unknown"),
                    text: String(m.text || ""),
                    timeIso: t
                };
            }) : [];

            const seen = new Set();
            const merged = modern.concat(normalizedLegacy).filter(function(m){
                const sig = [m.sender, m.text, m.timeIso].join("|");
                if (seen.has(sig)) return false;
                seen.add(sig);
                return true;
            }).sort(function(a,b){ return String(a.timeIso).localeCompare(String(b.timeIso)); });

            threads[id] = merged;
            write("chatThreads", threads);
            MMStorage.setItem(legacyKey(user, target), JSON.stringify(merged));
            return merged;
        }

        function setThreadMessages(user, target, messages){
            const id = threadId(user, target);
            const threads = read("chatThreads", {});
            threads[id] = messages;
            write("chatThreads", threads);
            MMStorage.setItem(legacyKey(user, target), JSON.stringify(messages));
        }

        function renderContacts(){
            const q = byId("contactSearch").value.toLowerCase().trim();
            const list = byId("contactList");
            const filtered = state.contacts.filter(function(c){ return !q || c.toLowerCase().includes(q); });
            if (!filtered.length) {
                list.innerHTML = '<div class="empty">No contacts</div>';
                return;
            }
            list.innerHTML = filtered.map(function(name){
                const active = name === state.target ? "active" : "";
                const encoded = encodeURIComponent(name);
                const pinActive = state.pinned.has(name) ? "active" : "";
                const star = state.pinned.has(name) ? "Unpin" : "Pin";
                return `
                    <div class="contact-item">
                        <button class="contact-btn ${active}" type="button" data-contact="${encoded}">${name}</button>
                        <button class="pin-btn ${pinActive}" type="button" data-pin="${encoded}" aria-label="Pin ${name}">${star}</button>
                    </div>
                `;
            }).join("");
        }

        function renderMessages(){
            const container = byId("messages");
            const query = byId("messageSearch").value.toLowerCase().trim();
            const filtered = state.messages.filter(function(m){ return !query || m.text.toLowerCase().includes(query); });

            if (!filtered.length) {
                container.innerHTML = '<div class="empty">No messages in this conversation.</div>';
                return;
            }

            container.innerHTML = filtered.map(function(m){
                const mine = m.sender === state.currentUser;
                return `
                  <article class="msg ${mine ? "me" : "other"}">
                    <div>${m.text}<span class="small">${m.sender} • ${fmtTime(m.timeIso)}</span></div>
                  </article>
                `;
            }).join("");
            container.scrollTop = container.scrollHeight;
        }

        function openContact(name){
            state.target = sanitizeName(name) || "Support";
            MMStorage.setItem("chatWith", state.target);
            byId("chatTitle").textContent = "Chat with " + state.target;
            byId("chatMeta").textContent = "Conversation key: " + threadId(state.currentUser, state.target);
            state.messages = getThreadMessages(state.currentUser, state.target);
            renderContacts();
            renderMessages();
            loadDraft();
        }

        function togglePin(name){
            const target = sanitizeName(name);
            if (!target) return;
            if (state.pinned.has(target)) state.pinned.delete(target);
            else state.pinned.add(target);
            savePinned();
            buildContacts();
            renderContacts();
        }

        function addContact(){
            const input = byId("newContactInput");
            const name = sanitizeName(input.value);
            if (!name) return;
            if (!state.contacts.includes(name)) state.contacts.push(name);
            input.value = "";
            buildContacts();
            openContact(name);
        }

        function sendMessage(){
            const input = byId("messageInput");
            const text = input.value.trim();
            if (!text) return;

            const next = {
                id: "m-" + Date.now() + "-" + Math.random().toString(36).slice(2,6),
                sender: state.currentUser,
                text: text,
                timeIso: nowIso()
            };

            state.messages.push(next);
            setThreadMessages(state.currentUser, state.target, state.messages);
            input.value = "";
            saveDraft();
            renderMessages();

            if (state.target.toLowerCase() === "support") {
                const replyTarget = state.target;
                byId("typingNote").style.display = "block";
                setTimeout(function(){
                    if (state.target !== replyTarget) return;
                    byId("typingNote").style.display = "none";
                    const auto = {
                        id: "a-" + Date.now(),
                        sender: "Support",
                        text: "Thanks for your message. We will get back to you shortly.",
                        timeIso: nowIso()
                    };
                    state.messages.push(auto);
                    setThreadMessages(state.currentUser, state.target, state.messages);
                    renderMessages();
                }, 900);
            }
        }

        function exportThread(){
            if (!state.messages.length) { alert("No messages to export"); return; }
            const payload = {
                user: state.currentUser,
                with: state.target,
                exportedAt: nowIso(),
                messages: state.messages
            };
            const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = ("chat-" + state.target.replace(/\s+/g, "-").toLowerCase() + ".json");
            a.click();
            URL.revokeObjectURL(url);
        }

        function exportThreadTxt(){
            if (!state.messages.length) { alert("No messages to export"); return; }
            const lines = [];
            lines.push("Chat Export");
            lines.push("User: " + state.currentUser);
            lines.push("With: " + state.target);
            lines.push("Exported: " + nowIso());
            lines.push("");
            state.messages.forEach(function(m){
                lines.push("[" + fmtTime(m.timeIso) + "] " + m.sender + ": " + m.text);
            });
            const blob = new Blob([lines.join("\n")], { type: "text/plain;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = ("chat-" + state.target.replace(/\s+/g, "-").toLowerCase() + ".txt");
            a.click();
            URL.revokeObjectURL(url);
        }

        function clearThread(){
            if (!confirm("Clear this conversation?")) return;
            state.messages = [];
            setThreadMessages(state.currentUser, state.target, []);
            renderMessages();
            clearDraft();
            alert("Conversation cleared");
        }

        function bindEvents(){
            byId("contactSearch").addEventListener("input", renderContacts);
            byId("messageSearch").addEventListener("input", renderMessages);
            byId("messageInput").addEventListener("input", saveDraft);
            byId("addContactBtn").addEventListener("click", addContact);
            byId("newContactInput").addEventListener("keydown", function(e){
                if (e.key === "Enter") {
                    e.preventDefault();
                    addContact();
                }
            });

            byId("contactList").addEventListener("click", function(e){
                const pin = e.target.closest("button[data-pin]");
                if (pin) {
                    togglePin(decodeURIComponent(pin.dataset.pin || ""));
                    return;
                }
                const btn = e.target.closest("button[data-contact]");
                if (!btn) return;
                openContact(decodeURIComponent(btn.dataset.contact || ""));
            });

            byId("sendBtn").addEventListener("click", sendMessage);
            byId("messageInput").addEventListener("keydown", function(e){
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            document.querySelectorAll("button[data-quick]").forEach(function(btn){
                btn.addEventListener("click", function(){
                    byId("messageInput").value = btn.dataset.quick || "";
                    byId("messageInput").focus();
                });
            });

            byId("newSupportBtn").addEventListener("click", function(){ openContact("Support"); });
            byId("exportBtn").addEventListener("click", exportThread);
            byId("exportTxtBtn").addEventListener("click", exportThreadTxt);
            byId("clearBtn").addEventListener("click", clearThread);
            byId("clearDraftBtn").addEventListener("click", clearDraft);
            byId("complaintBtn").addEventListener("click", submitComplaint);
            byId("ratingBtn").addEventListener("click", submitRating);

            window.addEventListener("storage", function(){
                buildContacts();
                state.messages = getThreadMessages(state.currentUser, state.target);
                renderContacts();
                renderMessages();
                loadDraft();
            });
        }

        function init(){
            state.currentUser = getCurrentUserName();
            loadPinned();
            buildContacts();
            bindEvents();
            openContact(state.target);
            updateCharCount();
        }

        window.addEventListener("load", function () {
            const ready = window.MMStorage && window.MMStorage.ready;
            if (ready && typeof ready.then === "function") {
                ready.finally(init);
                return;
            }
            init();
        });
    </script>

    <script defer src="upgrade.js"></script>

</body>
