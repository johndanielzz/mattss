<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Order Accepted - MatrixMarket</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 80px auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
            animation: fadeIn 1s ease-in-out;
        }

        h1 {
            color: #22c55e;
            font-size: 2rem;
        }

        p {
            margin: 15px 0;
            font-size: 1.1rem;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: #06b6d4;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
        }

        .btn:hover {
            background: #4f46e5;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    <link rel="stylesheet" href="upgrade.css">
    <script src="firebase-online-storage.js"></script>
</head>

<body>
    <div class="container">
        <h1>🎉 Order Accepted!</h1>
        <p>Your order has been placed successfully.
            Our seller has received your request and will begin processing soon.</p>
        <p>💌 A confirmation email/SMS will be sent to you shortly.</p>

        <a href="shop.html" class="btn">🛍 Continue Shopping</a>
        <a href="buyers-orders.html" class="btn">📦 View My Orders</a>
    </div>
    <script defer src="upgrade.js"></script>
  <script defer src="sw-register.js?v=20260226a"></script>
  <script defer src="site-performance.js?v=20260226a"></script>
</body>
</html>
