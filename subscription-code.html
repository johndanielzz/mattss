<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Seller Subscription Code - MatrixMarket</title>
    <link rel="stylesheet" href="seller-layout.css" />
    <link rel="stylesheet" href="upgrade.css" />
    <style>
        .code-shell {
            width: min(980px, 100% - 1.2rem);
            margin: 1rem auto 1.4rem;
            display: grid;
            gap: 0.8rem;
        }

        .code-value {
            border: 1px dashed rgba(103, 232, 249, 0.55);
            border-radius: 12px;
            background: rgba(2, 6, 23, 0.7);
            padding: 0.8rem;
            font-size: clamp(1.05rem, 2vw, 1.45rem);
            font-weight: 800;
            letter-spacing: 0.06em;
            text-align: center;
            color: #67e8f9;
            word-break: break-word;
        }

        .meta-list {
            display: grid;
            gap: 0.45rem;
        }

        .meta-row {
            border: 1px solid var(--sel-border);
            border-radius: 10px;
            background: rgba(2, 6, 23, 0.45);
            padding: 0.55rem;
            display: flex;
            justify-content: space-between;
            gap: 0.65rem;
            flex-wrap: wrap;
        }

        .code-state {
            border: 1px solid var(--sel-border);
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.65);
            padding: 0.75rem;
            display: grid;
            gap: 0.45rem;
        }

        .code-state p {
            margin: 0;
            color: var(--sel-muted);
        }

        .warn-box {
            border: 1px solid rgba(245, 158, 11, 0.42);
            border-radius: 12px;
            padding: 0.7rem;
            background: rgba(245, 158, 11, 0.14);
            color: #fcd34d;
        }

        .ok-box {
            border: 1px solid rgba(34, 197, 94, 0.4);
            border-radius: 12px;
            padding: 0.7rem;
            background: rgba(34, 197, 94, 0.14);
            color: #86efac;
        }
    </style>
    <script src="firebase-online-storage.js"></script>
</head>
<body class="seller-page">
    <div id="sellerHeader"></div>

    <main class="code-shell">
        <section class="seller-titlebar">
            <h1>Subscription Code Center</h1>
            <div class="seller-actions">
                <button class="btn-sel" id="refreshBtn" type="button">Refresh</button>
                <a class="btn-sel" href="payment-status-sellers.html">Payment Status</a>
                <a class="btn-sel primary" href="seller-dashboard.html">Dashboard</a>
            </div>
        </section>

        <section class="seller-grid cols-2">
            <article class="seller-card">
                <h3 style="margin:0 0 .55rem;">Your Access Code</h3>
                <div id="codeBox" class="code-value">No active code</div>

                <div class="seller-actions" style="margin-top:.65rem;">
                    <button class="btn-sel primary" id="generateBtn" type="button">Generate / Renew</button>
                    <button class="btn-sel" id="copyBtn" type="button">Copy</button>
                    <button class="btn-sel" id="downloadBtn" type="button">Download</button>
                    <button class="btn-sel" id="printBtn" type="button">Print</button>
                </div>

                <div id="codeMsg" class="sel-note" style="margin-top:.55rem;"></div>
            </article>

            <article class="seller-card">
                <h3 style="margin:0 0 .55rem;">Subscription Details</h3>
                <div id="stateBox" class="code-state"></div>
                <div class="meta-list" style="margin-top:.65rem;" id="metaList"></div>
            </article>
        </section>

        <section class="seller-card" id="statusPanel"></section>

        <div class="sel-foot">Keep this code private and share only with trusted admin support.</div>
    </main>

    <script src="seller-core.js?v=20260222g"></script>
    <script>
        let seller = null;

        function byId(id) { return document.getElementById(id); }

        function renderHeader() {
            byId("sellerHeader").innerHTML = SellerCore.renderSellerHeader("subscription-code.html");
        }

        function hasActiveSubscription(row) {
            const sub = SellerCore.str(row.subscription || "").toLowerCase();
            const status = SellerCore.str(row.status || "").toLowerCase();
            const pay = SellerCore.str(row.paymentStatus || "").toLowerCase();
            return sub === "active" || (status === "approved" && (pay === "paid" || pay === "approved"));
        }

        function getCodeRecord() {
            const all = SellerCore.codeMap();
            const key = SellerCore.cleanEmail(seller.email || "");
            return all[key] || null;
        }

        function codeState(record) {
            if (!record || !record.value) {
                return { kind: "missing", label: "No Code", daysLeft: 0, expired: true };
            }
            const expiryTime = new Date(record.expiry || 0).getTime();
            const expired = !Number.isFinite(expiryTime) || expiryTime < Date.now();
            const daysLeft = expired ? 0 : Math.max(0, Math.ceil((expiryTime - Date.now()) / 86400000));
            return {
                kind: expired ? "expired" : "active",
                label: expired ? "Expired" : "Active",
                daysLeft: daysLeft,
                expired: expired
            };
        }

        function renderInfo() {
            seller = SellerCore.ensureSellerSession("seller-login.html");
            if (!seller) return;

            const record = getCodeRecord();
            const state = codeState(record);

            byId("codeBox").textContent = record && record.value ? record.value : "No active code";
            byId("codeMsg").textContent = state.kind === "active"
                ? "Code is active and can be used for seller authentication."
                : "Generate a new code once your subscription is active.";

            byId("stateBox").innerHTML =
                '<p>Account: ' + SellerCore.badge(seller.status || "Pending") + '</p>' +
                '<p>Payment: ' + SellerCore.badge(seller.paymentStatus || "Pending") + '</p>' +
                '<p>Subscription: ' + SellerCore.badge(seller.subscription || "Inactive") + '</p>' +
                '<p>Code: ' + SellerCore.badge(state.label) + '</p>';

            byId("metaList").innerHTML = [
                ["Seller", seller.fullName || seller.name || "-"],
                ["Store", seller.store || "-"],
                ["Email", seller.email || "-"],
                ["Plan", seller.plan || "basic"],
                ["Expiry", record && record.expiry ? SellerCore.fmtDate(record.expiry) : "-"],
                ["Days Left", state.kind === "active" ? String(state.daysLeft) : "0"]
            ].map(function (item) {
                return '<div class="meta-row"><strong>' + item[0] + '</strong><span>' + item[1] + '</span></div>';
            }).join("");

            const activeSubscription = hasActiveSubscription(seller);
            const panel = byId("statusPanel");
            if (!activeSubscription) {
                panel.innerHTML =
                    '<div class="warn-box">Your subscription is not active yet. Complete payment and wait for admin approval before generating a code.</div>' +
                    '<div class="seller-actions" style="margin-top:.55rem;">' +
                    '<a class="btn-sel warning" href="payment-status-sellers.html">Open Payment Status</a>' +
                    '</div>';
                byId("generateBtn").disabled = true;
            } else {
                panel.innerHTML =
                    '<div class="ok-box">Subscription is active. You can generate or renew your subscription code at any time.</div>';
                byId("generateBtn").disabled = false;
            }
        }

        function generateOrRenew() {
            seller = SellerCore.ensureSellerSession("seller-login.html");
            if (!seller) return;
            if (!hasActiveSubscription(seller)) {
                alert("Subscription is not active yet.");
                return;
            }
            SellerCore.assignCode(seller.email);
            renderInfo();
            alert("Subscription code generated.");
        }

        function copyCode() {
            const code = SellerCore.str(byId("codeBox").textContent);
            if (!code || code === "No active code") {
                alert("No code available to copy.");
                return;
            }
            navigator.clipboard.writeText(code).then(function () {
                alert("Code copied to clipboard.");
            }).catch(function () {
                alert("Copy failed. Please copy manually.");
            });
        }

        function downloadCode() {
            seller = SellerCore.ensureSellerSession("seller-login.html");
            if (!seller) return;
            const record = getCodeRecord();
            if (!record || !record.value) {
                alert("No code to download.");
                return;
            }

            const content = [
                "MatrixMarket Seller Subscription Code",
                "Seller: " + (seller.fullName || seller.name || "-"),
                "Store: " + (seller.store || "-"),
                "Email: " + (seller.email || "-"),
                "Code: " + record.value,
                "Expiry: " + SellerCore.fmtDate(record.expiry),
                "Generated: " + SellerCore.fmtDate(new Date().toISOString())
            ].join("\n");

            const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "seller-subscription-code.txt";
            a.click();
            URL.revokeObjectURL(url);
        }

        function initSubscriptionCodePage() {
            renderHeader();
            renderInfo();

            byId("refreshBtn").addEventListener("click", renderInfo);
            byId("generateBtn").addEventListener("click", generateOrRenew);
            byId("copyBtn").addEventListener("click", copyCode);
            byId("downloadBtn").addEventListener("click", downloadCode);
            byId("printBtn").addEventListener("click", function () { window.print(); });
            window.addEventListener("storage", renderInfo);
        }

        function startSubscriptionCodePage() {
            const ready = window.MMStorage && window.MMStorage.ready;
            if (ready && typeof ready.then === "function") {
                ready.finally(initSubscriptionCodePage);
                return;
            }
            initSubscriptionCodePage();
        }

        if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", startSubscriptionCodePage);
        else startSubscriptionCodePage();
    </script>
    <script defer src="upgrade.js"></script>
  <script defer src="sw-register.js?v=20260226a"></script>
  <script defer src="site-performance.js?v=20260226a"></script>
</body>
</html>
