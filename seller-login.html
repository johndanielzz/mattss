<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Seller Login - MatrixMarket</title>
  <link rel="stylesheet" href="seller-layout.css" />
  <link rel="stylesheet" href="upgrade.css" />
  <style>
    .login-wrap{width:min(520px,100% - 18px);margin:2rem auto;background:var(--sel-surface);border:1px solid var(--sel-border);border-radius:14px;padding:1rem}
    .login-wrap h1{margin:0 0 .35rem;color:#67e8f9}
    .hint{margin:0 0 .75rem;color:var(--sel-muted);font-size:.9rem}
    .login-actions{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem}
    .btn-sel[disabled]{opacity:.72;cursor:not-allowed}
    .login-state{display:none;margin-top:.45rem;color:#67e8f9;font-size:.88rem}
    .msg{display:none;border-radius:10px;padding:.55rem .65rem;margin-top:.65rem;font-size:.88rem}
    .msg.ok{background:rgba(34,197,94,.18);border:1px solid rgba(34,197,94,.35);color:#86efac}
    .msg.err{background:rgba(239,68,68,.18);border:1px solid rgba(239,68,68,.35);color:#fca5a5}
  </style>
    <script src="firebase-online-storage.js"></script>
</head>
<body class="seller-page">
  <header class="seller-header">
    <div class="seller-header-inner">
      <div class="seller-brand">MatrixMarket Seller</div>
      <nav class="seller-nav">
        <a href="index.html">Home</a>
        <a href="sellers.html">Sellers</a>
        <a href="seller-register.html">Register</a>
      </nav>
    </div>
  </header>

  <main class="seller-shell">
    <section class="login-wrap">
      <h1>Seller Login</h1>
      <p class="hint">Login after admin approval. Subscription must be paid via Wave/Comcash to account 6785316.</p>

      <div class="seller-form-grid">
        <input style="width: 500px;" class="sel" id="identifier" type="text" placeholder="Email or Subscription Code" />
        <input style="width: 500px;" class="sel" id="password" type="password" placeholder="Password (optional for code login)" />
        <label class="sel-note"><input id="showPass" type="checkbox" style="width:auto; margin-right:6px;" />Show password</label>
      </div>

      <div class="login-actions">
        <button class="btn-sel primary" id="loginBtn" type="button">Login</button>
        <a class="btn-sel" href="seller-register.html">Create Seller Account</a>
      </div>
      <div id="loginState" class="login-state">Loging in...</div>

      <div id="okMsg" class="msg ok"></div>
      <div id="errMsg" class="msg err"></div>
    </section>
  </main>

  <script src="seller-core.js?v=20260222g"></script>
  <script>
    let loginBusy = false;
    function byId(id){ return document.getElementById(id); }
    function show(type, text){
      byId("okMsg").style.display = type === "ok" ? "block" : "none";
      byId("errMsg").style.display = type === "err" ? "block" : "none";
      (type === "ok" ? byId("okMsg") : byId("errMsg")).textContent = text;
    }

    function clearStatus() {
      byId("okMsg").style.display = "none";
      byId("errMsg").style.display = "none";
      byId("okMsg").textContent = "";
      byId("errMsg").textContent = "";
    }

    function setBusy(isBusy, text) {
      const btn = byId("loginBtn");
      const state = byId("loginState");
      loginBusy = Boolean(isBusy);
      btn.disabled = loginBusy;
      btn.textContent = text || (loginBusy ? "Loging in..." : "Login");
      state.style.display = loginBusy ? "block" : "none";
    }

    async function syncStorage() {
      const sync = window.MMStorage && window.MMStorage.syncNow;
      if (sync && typeof sync === "function") {
        try { await sync(); } catch (_) {}
      }
    }

    async function login(){
      if (loginBusy) return;
      const identifier = byId("identifier").value.trim();
      const password = byId("password").value;
      if (!identifier) {
        show("err", "Enter your email or subscription code.");
        return;
      }

      setBusy(true, "Loging in...");
      clearStatus();
      let redirecting = false;
      try {
        await syncStorage();
        let result = SellerCore.authenticateSeller(identifier, password);
        if (!result.ok) {
          await new Promise(function (resolve) { setTimeout(resolve, 280); });
          await syncStorage();
          result = SellerCore.authenticateSeller(identifier, password);
        }

        if (!result.ok) {
          show("err", result.reason || "Login failed.");
          return;
        }

        show("ok", "Login successful. Redirecting...");
        redirecting = true;
        setTimeout(function(){ window.location.href = "seller-dashboard.html"; }, 700);
      } finally {
        if (!redirecting) setBusy(false, "Login");
      }
    }

    function initSellerLoginPage() {
      const active = SellerCore.getCurrentSeller();
      if (active && SellerCore.hasActiveSubscription(active)) {
        show("ok", "You are already logged in. Redirecting...");
        setTimeout(function(){ window.location.href = "seller-dashboard.html"; }, 600);
      } else if (active) {
        show("err", "Account found but subscription is not active yet. Complete payment and wait for admin approval.");
      }

      byId("loginBtn").addEventListener("click", login);
      byId("identifier").addEventListener("keydown", function(e){ if (e.key === "Enter") login(); });
      byId("password").addEventListener("keydown", function(e){ if (e.key === "Enter") login(); });
      byId("showPass").addEventListener("change", function(){ byId("password").type = this.checked ? "text" : "password"; });
    }

    function startSellerLoginPage() {
      const ready = window.MMStorage && window.MMStorage.ready;
      if (ready && typeof ready.then === "function") {
        ready.finally(initSellerLoginPage);
        return;
      }
      initSellerLoginPage();
    }

    if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", startSellerLoginPage);
    else startSellerLoginPage();
  </script>
  <script defer src="upgrade.js?v=20260222b"></script>
  <script defer src="sw-register.js?v=20260226a"></script>
  <script defer src="site-performance.js?v=20260226a"></script>
</body>
</html>
